name: build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  image:
    name: build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: rtsp-forwarder
            dockerfile: Dockerfile
          - image: rtsp-recorder
            dockerfile: Dockerfile.recorder
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  chart:
    name: lint & push chart ${{ matrix.chart }}
    runs-on: ubuntu-latest
    needs: image
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        chart: [rtsp-forwarder, rtsp-recorder]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint
        run: helm lint charts/${{ matrix.chart }}

      - name: Helm template (smoke test)
        run: |
          helm template test charts/${{ matrix.chart }} \
            -f charts/${{ matrix.chart }}/values-example.yaml > /dev/null

      - name: Login to GHCR (Helm)
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Package chart
        if: github.event_name != 'pull_request'
        id: package
        run: |
          mkdir -p .cr-release-packages
          helm package charts/${{ matrix.chart }} -d .cr-release-packages
          PKG=$(ls .cr-release-packages/${{ matrix.chart }}-*.tgz | head -n1)
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"

      - name: Push chart to GHCR (OCI)
        if: github.event_name != 'pull_request'
        run: |
          helm push ${{ steps.package.outputs.pkg }} \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
