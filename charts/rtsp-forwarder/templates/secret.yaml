{{- if .Values.useSecrets }}
{{- range $cam := .Values.cameras }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rtsp-forwarder.fullname" $ }}-{{ $cam.name }}
  labels:
    {{- include "rtsp-forwarder.labels" $ | nindent 4 }}
    camera: {{ $cam.name | quote }}
type: Opaque
stringData:
  RTSP_URL: {{ required (printf "cameras[%s].rtspUrl is required" $cam.name) $cam.rtspUrl | quote }}
  RTMP_URL: {{ required (printf "cameras[%s].rtmpUrl is required" $cam.name) $cam.rtmpUrl | quote }}
{{- end }}
{{- end }}
