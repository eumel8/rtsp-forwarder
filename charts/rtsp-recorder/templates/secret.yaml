{{- if .Values.useSecrets }}
{{- range $cam := .Values.cameras }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rtsp-recorder.fullname" $ }}-{{ $cam.name }}
  labels:
    {{- include "rtsp-recorder.labels" $ | nindent 4 }}
    camera: {{ $cam.name | quote }}
type: Opaque
stringData:
  SOURCE_URL: {{ required (printf "cameras[%s].sourceUrl is required" $cam.name) $cam.sourceUrl | quote }}
{{- end }}
{{- end }}
